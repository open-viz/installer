{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  annotations:
    openshift.io/internal-registry-auth-token.binding: bound
    openshift.io/internal-registry-auth-token.service-account: {{ include "thanos-querier.fullname" . }}
  name: {{ include "thanos-querier.secretDockercfg" . }}
  namespace: {{ .Release.Namespace }}
data:
  .dockercfg: 
type: kubernetes.io/dockercfg
{{- end }}
